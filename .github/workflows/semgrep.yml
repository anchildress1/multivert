name: Semgrep

# Keeps Semgrep's AppSec Platform findings fresh even when no app code lands.
# Push/PR scans catch changed code; the weekly schedule catches rule and
# supply-chain drift. Computers do love inventing paperwork.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: '17 6 * * 1'

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || !github.event.pull_request.draft) }}
    permissions:
      contents: read
    container:
      image: semgrep/semgrep:1.167.0@sha256:06938c1f365d3f67b8cedd8bc117607ae64253f88a0e768e9da9408548927dd6
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Semgrep CI (code + supply chain)
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: semgrep ci --supply-chain
