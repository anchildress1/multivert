<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="color-scheme" content="light dark" />
		<meta name="apple-mobile-web-app-title" content="Multivert" />
		<meta name="application-name" content="Multivert" />
		<title>Multivert — what vert are you?</title>
		<meta
			name="description"
			content="A five-sided personality quiz. Introvert, extrovert, ambivert, omnivert, otrovert—35 questions, one slider, a five-way breakdown at the end. Answers stay on your device."
		/>
		<!-- nosemgrep: html.security.audit.missing-integrity.missing-integrity — `rel=canonical` is metadata, not a fetched subresource, so SRI does not apply. -->
		<link rel="canonical" href="https://multivert.pages.dev/" />
		<meta name="robots" content="index, follow" />
		<!-- Browser chrome (address bar tint, etc). Light/dark variants match
		     the --paper token in src/app.css for visual continuity. -->
		<meta name="theme-color" content="#f8f7f4" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1a1815" media="(prefers-color-scheme: dark)" />

		<!-- OG / social share. Static because +page.ts disables SSR (the
		     answers store is module-scoped reactive state); without these
		     baked in, scrapers that don't run JS would see an empty head. -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://multivert.pages.dev/" />
		<meta property="og:title" content="Multivert — what vert are you?" />
		<meta
			property="og:description"
			content="A five-sided personality quiz. Introvert, extrovert, ambivert, omnivert, otrovert—35 questions, one slider, a five-way breakdown at the end."
		/>
		<meta property="og:site_name" content="Multivert" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:image" content="https://multivert.pages.dev/og-image.png" />
		<meta property="og:image:secure_url" content="https://multivert.pages.dev/og-image.png" />
		<meta property="og:image:type" content="image/png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="Multivert — Which of the five verts are you?" />

		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Multivert — what vert are you?" />
		<meta
			name="twitter:description"
			content="A five-sided personality quiz. 35 questions, one slider, a five-way breakdown at the end."
		/>
		<meta name="twitter:image" content="https://multivert.pages.dev/og-image.png" />
		<meta name="twitter:image:alt" content="Multivert — Which of the five verts are you?" />

		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Quiz",
				"name": "Multivert — what vert are you?",
				"description": "A five-sided personality quiz. Introvert, extrovert, ambivert, omnivert, otrovert—35 questions, one slider, a five-way breakdown at the end.",
				"url": "https://multivert.pages.dev/",
				"inLanguage": "en",
				"isAccessibleForFree": true,
				"numberOfQuestions": 35,
				"about": {
					"@type": "Thing",
					"name": "Personality typology — five-vert model",
					"description": "Introvert, extrovert, ambivert, omnivert, and otrovert as five distinct personality vectors."
				},
				"publisher": {
					"@type": "Organization",
					"name": "Multivert",
					"url": "https://multivert.pages.dev/"
				},
				"author": {
					"@type": "Person",
					"name": "Ashley Childress",
					"url": "https://anchildress1.dev",
					"sameAs": ["https://github.com/anchildress1"]
				}
			}
		</script>

		<!-- WebSite + DefinedTermSet. The five verts are visible on the page
		     (hero list + lede), so defining them as terms is compliant and
		     gives search + AI answer engines a structured, citable gloss of
		     each type — the exact thing "what is an otrovert" queries want. -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@graph": [
					{
						"@type": "WebSite",
						"@id": "https://multivert.pages.dev/#website",
						"url": "https://multivert.pages.dev/",
						"name": "Multivert",
						"description": "A five-sided personality quiz scoring introvert, extrovert, ambivert, omnivert, and otrovert as five independent fits.",
						"inLanguage": "en"
					},
					{
						"@type": "DefinedTermSet",
						"@id": "https://multivert.pages.dev/#verts",
						"name": "The five verts",
						"description": "Five personality types treated as independent vectors rather than a single introvert/extrovert bucket.",
						"hasDefinedTerm": [
							{
								"@type": "DefinedTerm",
								"name": "Introvert",
								"description": "Inward, charged by quiet — energy comes from low-stimulation, solo or small-group time."
							},
							{
								"@type": "DefinedTerm",
								"name": "Extrovert",
								"description": "Outward, charged by people — energy comes from social stimulation and larger groups."
							},
							{
								"@type": "DefinedTerm",
								"name": "Ambivert",
								"description": "The dial, not a default — adjusts toward introversion or extroversion to fit the situation; a stable middle."
							},
							{
								"@type": "DefinedTerm",
								"name": "Omnivert",
								"description": "Oscillates between extremes — swings hard between all-in and off-grid rather than sitting in a mild middle."
							},
							{
								"@type": "DefinedTerm",
								"name": "Otrovert",
								"description": "Belongs without belonging — present in a group while feeling like an observer; identity is not tied to membership."
							}
						]
					}
				]
			}
		</script>

		<!-- Read the persisted theme override before first paint so users who
		     chose a non-system theme do not see a one-frame flash of the
		     system default. The reactive ThemeToggle component reads the
		     same key on mount and keeps its own state in sync. -->
		<script>
			(function () {
				try {
					var v = localStorage.getItem('multivert:theme');
					if (v === 'light' || v === 'dark') {
						document.documentElement.dataset.theme = v;
					}
				} catch (err) {
					// localStorage blocked (private browsing, ITP, CSP) — log the
					// failure name and fall back to the system preference, which
					// the CSS already handles via `color-scheme: light dark`.
					console.warn('[theme] preflight read failed:', err && err.name);
				}
			})();
		</script>
		<style>
			#app-shell {
				position: fixed;
				inset: 0;
				z-index: 999;
				background: #f8f7f4;
				display: grid;
				place-items: center;
				font:
					400 0.875rem / 1.5 Georgia,
					serif;
				color: #1a1815;
			}
			[data-theme='dark'] #app-shell {
				background: #1a1815;
				color: #f8f7f4;
			}
			@media (prefers-color-scheme: dark) {
				:not([data-theme='light']) #app-shell {
					background: #1a1815;
					color: #f8f7f4;
				}
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="antialiased">
		<output id="app-shell" aria-live="polite">
			<span style="opacity: 0.4">Loading…</span>
		</output>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
